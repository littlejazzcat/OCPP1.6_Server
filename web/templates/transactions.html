{% extends "base.html" %}
{% block content %}
<h1>💰 交易记录</h1>

<div class="pager-bar">
  <span id="tx-page-info" style="font-size:13px;color:#888;min-width:150px;">Loading...</span>
  <span style="flex:1;"></span>
  <select id="tx-page-size-select" onchange="changeTxPageSize()" style="padding:3px 6px;font-size:12px;border:1px solid #ddd;border-radius:4px;">
    <option value="10" selected>10 / p</option>
    <option value="25">25 / p</option>
    <option value="50">50 / p</option>
    <option value="100">100 / p</option>
  </select>
  <button class="btn btn-sm" id="tx-btn-first" onclick="goTxPage('first')">«</button>
  <button class="btn btn-sm" id="tx-btn-prev" onclick="goTxPage('prev')">‹</button>
  <span id="tx-page-num" style="font-size:13px;color:#888;min-width:45px;text-align:center;">1/1</span>
  <button class="btn btn-sm" id="tx-btn-next" onclick="goTxPage('next')">›</button>
  <button class="btn btn-sm" id="tx-btn-last" onclick="goTxPage('last')">»</button>
  <span style="flex:1;"></span>
  <button class="btn btn-sm btn-danger" onclick="clearTransactions()">🗑 清除所有</button>
</div>

<table>
  <thead>
    <tr>
      <th>事务 ID</th>
      <th>ChargeBox</th>
      <th>连接器</th>
      <th>标签</th>
      <th>开始时间</th>
      <th>结束时间</th>
      <th>起始电量</th>
      <th>结束电量</th>
      <th>消耗 (Wh)</th>
      <th>停止原因</th>
    </tr>
  </thead>
  <tbody id="tx-tbody">
    <tr><td colspan="10" class="empty">加载中...</td></tr>
  </tbody>
</table>

<script>
let TX_PAGE_SIZE = 10;
let txCurrentPage = 1;
let txTotal = 0;

function fetchTxPage(page) {
  const offset = (page - 1) * TX_PAGE_SIZE;
  fetch(`/api/transactions?limit=${TX_PAGE_SIZE}&offset=${offset}`)
    .then(r => r.json())
    .then(data => {
      txTotal = data.total;
      txCurrentPage = page;
      renderTxTable(data.transactions);
      updateTxPager();
    });
}

function renderTxTable(txs) {
  const tbody = document.getElementById("tx-tbody");
  if (!txs || txs.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="empty">暂无交易记录</td></tr>';
    return;
  }
  tbody.innerHTML = txs.map(tx => {
    const meterUsed = tx.meter_stop ? (tx.meter_stop - tx.meter_start) : '-';
    return `<tr>
      <td>${tx.transaction_id}</td>
      <td>${tx.charge_point_id}</td>
      <td>#${tx.connector_id}</td>
      <td>${tx.id_tag}</td>
      <td>${tx.start_timestamp ? tx.start_timestamp.slice(5,16).replace('T',' ') : '-'}</td>
      <td>${tx.end_timestamp ? tx.end_timestamp.slice(5,16).replace('T',' ') : '进行中'}</td>
      <td>${tx.meter_start}</td>
      <td>${tx.meter_stop || '-'}</td>
      <td><strong>${meterUsed}</strong></td>
      <td>${tx.stop_reason || '-'}</td>
    </tr>`;
  }).join('');
}

function updateTxPager() {
  const totalPages = Math.max(1, Math.ceil(txTotal / TX_PAGE_SIZE));
  const startIdx = txTotal === 0 ? 0 : (txCurrentPage - 1) * TX_PAGE_SIZE + 1;
  const endIdx = Math.min(txTotal, txCurrentPage * TX_PAGE_SIZE);
  document.getElementById("tx-page-info").textContent = `Showing ${startIdx}-${endIdx} of ${txTotal}`;
  document.getElementById("tx-page-num").textContent = `${txCurrentPage}/${totalPages}`;
  document.getElementById("tx-btn-first").disabled = txCurrentPage <= 1;
  document.getElementById("tx-btn-prev").disabled = txCurrentPage <= 1;
  document.getElementById("tx-btn-next").disabled = txCurrentPage >= totalPages;
  document.getElementById("tx-btn-last").disabled = txCurrentPage >= totalPages;
}

function goTxPage(dir) {
  const totalPages = Math.max(1, Math.ceil(txTotal / TX_PAGE_SIZE));
  let p = txCurrentPage;
  if (dir === 'first') p = 1;
  else if (dir === 'last') p = totalPages;
  else if (dir === 'prev') p = Math.max(1, p - 1);
  else if (dir === 'next') p = Math.min(totalPages, p + 1);
  if (p !== txCurrentPage) fetchTxPage(p);
}

function changeTxPageSize() {
  TX_PAGE_SIZE = parseInt(document.getElementById("tx-page-size-select").value);
  fetchTxPage(1);
}

async function clearTransactions() {
  if (!confirm('确认清除所有交易记录？此操作不可撤销。')) return;
  await fetch('/api/transactions', {method: 'DELETE'});
  fetchTxPage(1);
}

fetchTxPage(1);
</script>
{% endblock %}
